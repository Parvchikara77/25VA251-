<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Java Script Variable</h1>
    <script>
        // variable are containers in js
        var myName= "Ab";
        document.write(myName);
        console.log(myName);
        //JS execution and scope(Global and local)
        function demo(){
            //participate in hosting case
            var msg = "thanks" //local
            console.log(msg);
        }
        demo();
        // var declaration using let and const
        // let and cost do not participate in hosting case
        let msg2= "Hello";
        console.log(msg2);

        const msg3= "thanks  to Visit my page";
        console.log(msg3);
    </script>
</body>
</html>
