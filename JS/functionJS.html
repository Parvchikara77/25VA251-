<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Normal function without parameter
        function demo(){
            console.log("hello JS");
        }
        demo();

        //with parameter
        function demo1(text){
            console.log("hello" + " " + text);
        }
        demo1("SS");

        //fn with default parameter
        function add(a,b){
            console.log("addition of two number is " + (a+b));
        }
        add(50,20);

        //annonymous fn
        let mul = function(){
            var num1 = 4;
            var num2 = 3;
            var mul = num1*num2;
            console.log("multiplication of two nos is " + mul);
        }
        mul();

        //arrow fn
        let div=(x,y)=>{
            var num1 = x;
            var num2 = y;
            var div = x/y;
            console.log("division of x and y is" + " " + div);
        }
        div(12,3);

        //arrrow fn with single line statement
        let msg=()=>console.log("Hello");
        msg();

        //callback fn
        function sub(callback){
            var num1 = 6;
            var num2 = 3;
            var sub = num1 - num2;
            callback(sub);
        }
        function displaysub(sub){
            console.log("Result is" +" " + sub);
        }
        sub(displaysub);

        function msg1(){
            console.log("Hello");
        }
        setTimeout(msg1,2000)
        
    </script>
</body>
</html>
